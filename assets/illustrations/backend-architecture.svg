<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="100" x2="1040" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" stroke="#E2E8F0" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="760" rx="32" fill="url(#grid)"/>

  <text x="80" y="104" fill="#93C5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.4">BACKEND ARCHITECTURE</text>
  <text x="80" y="148" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="900">Layers that stay inspectable</text>
  <text x="80" y="184" fill="#A5B4FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">Clear service boundaries, durable state, and visible delivery paths.</text>

  <g fill="#0B1324" stroke="#E2E8F0" stroke-opacity="0.09" stroke-width="1.5">
    <rect x="86" y="238" width="1028" height="96" rx="24"/>
    <rect x="142" y="372" width="916" height="96" rx="24"/>
    <rect x="198" y="506" width="804" height="96" rx="24"/>
    <rect x="254" y="640" width="692" height="96" rx="24"/>
  </g>

  <path d="M180 286H1020M236 420H964M292 554H908M348 688H852" stroke="url(#accent)" stroke-opacity="0.28" stroke-width="2.5" stroke-linecap="round"/>

  <circle cx="1000" cy="286" r="14" fill="#38BDF8"/>
  <circle cx="944" cy="420" r="14" fill="#22D3EE"/>
  <circle cx="888" cy="554" r="14" fill="#A855F7"/>
  <circle cx="832" cy="688" r="14" fill="#63E6BE"/>

  <text x="130" y="298" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Frontend</text>
  <text x="130" y="330" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">React surfaces, input handling, and view state.</text>

  <text x="186" y="432" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">API Layer</text>
  <text x="186" y="464" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Node, Express, FastAPI, and service boundaries.</text>

  <text x="242" y="566" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Data Layer</text>
  <text x="242" y="598" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">PostgreSQL, MongoDB, Supabase, and auth state.</text>

  <text x="298" y="700" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Delivery</text>
  <text x="298" y="732" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Docker, Vercel, Railway, Render, and observability.</text>
</svg>
