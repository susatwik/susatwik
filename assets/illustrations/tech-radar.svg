  <text x="80" y="150" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="900">A stack that stays readable</text>
  <text x="80" y="186" fill="#A5B4FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">Frontend, backend, AI, data, and delivery are visible at a glance.</text>

