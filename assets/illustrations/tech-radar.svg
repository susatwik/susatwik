  <text x="860" y="350" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Node, Express, FastAPI, APIs</text>
  <text x="196" y="496" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">PostgreSQL, MongoDB, Supabase</text>
