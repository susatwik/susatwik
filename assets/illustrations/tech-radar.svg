  <circle cx="364" cy="317" r="10" fill="#38BDF8"/>
  <circle cx="836" cy="317" r="10" fill="#22D3EE"/>
  <circle cx="364" cy="463" r="10" fill="#A855F7"/>
  <circle cx="836" cy="463" r="10" fill="#63E6BE"/>
  <circle cx="600" cy="655" r="10" fill="url(#accent)"/>

  <text x="198" y="323" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Frontend</text>
  <text x="860" y="323" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Backend</text>
  <text x="196" y="469" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Databases</text>
  <text x="845" y="469" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">AI / GenAI</text>
