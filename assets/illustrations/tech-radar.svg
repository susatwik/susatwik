    <path d="M-226 0H226M0 -226V226M-160 -160L160 160M160 -160L-160 160" stroke="#93C5FD" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="0" cy="0" r="28" fill="url(#accent)"/>
    <text x="-20" y="6" fill="#F8FAFC" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800">AI</text>
  </g>

  <g fill="#0B1324" stroke="#E2E8F0" stroke-opacity="0.09" stroke-width="1.5">
    <rect x="170" y="278" width="188" height="78" rx="22"/>
    <rect x="834" y="278" width="188" height="78" rx="22"/>
    <rect x="170" y="424" width="188" height="78" rx="22"/>
    <rect x="834" y="424" width="188" height="78" rx="22"/>
    <rect x="506" y="616" width="188" height="78" rx="22"/>
